apiVersion: v1
kind: Service
metadata:
  labels:
    safe.k8s.fmeflow.component: queue
    {{- include "fmeflow.common.labels" . | indent 4 }}
  {{- with .Values.annotations.queue.service }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: fmeflowqueue
spec:
  ports:
  - name: redis
    port: 6379
  clusterIP: None
  selector:
    safe.k8s.fmeflow.component: queue
