{{- range .Values.fmeflow.engines.groups }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    safe.k8s.fmeflow.component: engine
    {{- include "fmeflow.common.labels" $ | indent 4 }}
  name: "engine-{{ .name }}"
  {{- with $.Values.annotations.engine.deployment }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  replicas: {{ .engines }}
  selector:
    matchLabels:
      safe.k8s.fmeflow.component: engine
  template:
    metadata:
      labels:
        safe.k8s.fmeflow.component: engine
        {{- include "fmeflow.common.labels" $ | indent 8 }}
        {{- with .labels }}
{{ toYaml . | indent 8 }}
        {{- end }}
      {{- with $.Values.annotations.engine.template }}
      annotations:
{{ toYaml . | indent 8 }}
      {{- end }}
    spec:
      {{- if $.Values.fmeflow.engines.podDeletionCost.enabled }}
      # fsGroup so the engine UID (1363) can write the marker file to the
      # emptyDir mounted at /var/run/fmeflow/. With fsGroupChangePolicy:
      # OnRootMismatch (K8s 1.23+ default) this is a no-op on already-correct
      # PVCs.
      securityContext:
        fsGroup: 1363
      {{- end }}
      {{- if $.Values.fmeflow.image.pullSecrets }}
      imagePullSecrets:
        {{- range $.Values.fmeflow.image.pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - image: {{ if .image }}{{ if .image.registry }}{{ .image.registry }}{{ else }}{{ template "fmeflow.image.registry" $ }}{{ end }}/{{ if .image.namespace }}{{ .image.namespace }}{{ else }}{{ template "fmeflow.image.namespace" $ }}{{ end }}/{{ if .image.name }}{{ .image.name }}{{ else }}fmeflow-engine{{ end }}:{{ if .image.tag }}{{ .image.tag }}{{ else }}{{ template "fmeflow.image.tag" $ }}{{ end }}{{else}}{{ template "fmeflow.image.registry" $ }}/{{ template "fmeflow.image.namespace" $ }}/fmeflow-engine:{{ template "fmeflow.image.tag" $ }}{{ end }}
          name: engine
          imagePullPolicy: {{ if .image }}{{ if .image.pullPolicy }}{{ .image.pullPolicy }}{{ else }}{{ template "fmeflow.image.pullPolicy" $ }}{{ end }}{{ else }}{{ template "fmeflow.image.pullPolicy" $ }}{{ end }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    fmePid=$(pidof fme);
                    jobId=$(ls -lR /proc/ 2>&1 | grep -oP "job_\d+" | sed -n '1p');
                    currentJobId=$(ls -lR /proc/ 2>&1 | grep -oP "job_\d+" | sed -n '1p');
                    while ls -lR /proc/$fmePid 2>&1 | grep -q job_; do
                      while [ "$jobId" = "$currentJobId" ]
                      do
                        currentJobId=$(ls -lR /proc/ 2>&1 | grep -oP "job_\d+" | sed -n '1p');
                        sleep 1;
                      done
                      exit
                    done
          volumeMounts:
            - mountPath: /data/fmeflowdata
              name: fmeflowdata
              {{- if $.Values.storage.fmeflow.volumePath }}
              subPath: {{ $.Values.storage.fmeflow.volumePath }}
              {{- end }}
            {{- if $.Values.additionalStorage }}
            {{- range $.Values.additionalStorage }}
            - mountPath: {{ .mountPath }}
              name: {{ .name }}
            {{- end }}
            {{- end }}
            {{- if .trustedCACerts }}
            {{- if .trustedCACerts.secretName }}
            - mountPath: /etc/fmeflow/trusted-ca-certs
              name: trusted-ca-certs
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if $.Values.fmeflow.engines.podDeletionCost.enabled }}
            - mountPath: {{ dir $.Values.fmeflow.engines.podDeletionCost.markerFilePath }}
              name: pod-deletion-cost-state
            {{- end }}
          env:
            {{- if $.Values.fmeflow.engines.podDeletionCost.enabled }}
            - name: POD_DELETION_COST_WATCHER_ENABLED
              value: "true"
            - name: POD_DELETION_COST_WATCHER_MARKER_FILE
              value: "{{ $.Values.fmeflow.engines.podDeletionCost.markerFilePath }}"
            - name: POD_DELETION_COST_WATCHER_POLL_INTERVAL_SECONDS
              value: "{{ $.Values.fmeflow.engines.podDeletionCost.pollIntervalSeconds }}"
            {{- end }}
            - name: EXTERNALHOSTNAME
              value: {{ $.Values.deployment.hostname }}
            - name: WEBPROTOCOL
              value: {{ template "fmeflow.deployment.protocol" $ }}
            - name: EXTERNALPORT
              value: "{{ $.Values.deployment.port }}"
            - name: COREHOSTNAME
              value: engineregistration
            - name: NODENAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if .type }}
            - name: ENGINETYPE
              value: {{ .type | quote }}
            {{- end }}
            - name: NODEMANAGED
              value: "{{ $.Values.fmeflow.engines.enginesNodeManaged }}"
            - name: ENGINERECEIVETIMEOUT
              value: "{{ $.Values.fmeflow.engines.receiveTimeout }}"
            - name: ENGINEDEBUGLEVEL
              value: "{{ $.Values.fmeflow.engines.debugLevel }}"
            - name: ENGINEPROPERTIES
              {{- if .engineProperties }}
              value: "{{ .engineProperties }},{{ .name }}"
              {{- else }}
              value: "{{ .name }}"
              {{- end }}
            - name: PGSQLHOSTNAME
              value: "{{ template "fmeflow.database.host" $ }}"
            - name: PGSQLPORT
              value: "{{ $.Values.fmeflow.database.port }}"
            - name: PGSQLDATABASENAME
              value: "{{ $.Values.fmeflow.database.name }}"
            {{- if $.Values.fmeflow.database.azure}}
            - name: PGSQLUSERNAME
              value: "{{ $.Values.fmeflow.database.user }}@{{ template "fmeflow.database.host" $ }}"
            {{- else }}
            - name: PGSQLUSERNAME
              value: "{{ $.Values.fmeflow.database.user }}"
            {{- end }}
            - name: PGSQLPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ template "fmeflow.database.secretName" $ }}
                  key: {{ $.Values.fmeflow.database.passwordSecretKey }}
            {{- if $.Values.fmeflow.database.ssl }}
            - name: POSTGRESQLSSL
              value: 'true'
            {{- end }}
            {{- if not $.Values.fmeflow.waitForDatabase }}
            - name: WAITFORDATABASE
              value: 'false'
            {{- end }}
            {{- if .memorylimit }}
            {{- if or ( and (.memorylimit.top) (not .memorylimit.bottom)) ( and (not .memorylimit.top) (.memorylimit.bottom)) }}
            {{- fail "Both memorylimit.top and memorylimit.bottom must be set, not just one" }}
            {{- else if or (lt (.memorylimit.top) 0.0) (ge (.memorylimit.top) 1.0)}}
            {{- fail "memorylimit.top must be between 0.0 and 1.0"}}
            {{- else if or (lt (.memorylimit.bottom) 0.0) (ge (.memorylimit.bottom) 1.0)}}
            {{- fail "memorylimit.bottom must be between 0.0 and 1.0"}}
            {{- else if lt (.memorylimit.top) (.memorylimit.bottom)}}
            {{- fail "memorylimit.top must be greater than memorylimit.bottom"}}
            {{- else }}
            {{- if and (.memorylimit.top) (.memorylimit.bottom) }}
            - name: MEMORYLIMITTOP
              value: {{ .memorylimit.top | quote }}
            - name: MEMORYLIMITBOTTOM
              value: {{ .memorylimit.bottom | quote }}
            {{- end}}
            {{- end}}
            {{- else if .resources }}
            {{- if .resources.limits }}
            {{- if .resources.limits.memory }}
            {{- $memoryLimitTop := 0.8}}
            {{- $memoryLimitBottom := 0.7}}
            {{- $megabytes := 0 }}
            {{- if hasSuffix "Ki" (toString .resources.limits.memory) }}
              {{- $megabytes = divf (float64 (trimSuffix "Ki" .resources.limits.memory)) 1024 }}
            {{- else if hasSuffix "Mi" (toString .resources.limits.memory) }}
              {{- $megabytes = float64 (trimSuffix "Mi" .resources.limits.memory) }}
            {{- else if hasSuffix "Gi" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "Gi" .resources.limits.memory)) 1024 }}
            {{- else if hasSuffix "Ti" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "Ti" .resources.limits.memory)) 1024 1024 }}
            {{- else if hasSuffix "Pi" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "Pi" .resources.limits.memory)) 1024 1024 1024 }}
            {{- else if hasSuffix "Ei" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "Ei" .resources.limits.memory)) 1024 1024 1024 1024 }}
            {{- else if hasSuffix "k" (toString .resources.limits.memory) }}
              {{- $megabytes = divf (float64 (trimSuffix "k" .resources.limits.memory)) 1000 }}
            {{- else if hasSuffix "M" (toString .resources.limits.memory) }}
              {{- $megabytes = float64 (trimSuffix "M" .resources.limits.memory) }}
            {{- else if hasSuffix "G" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "G" .resources.limits.memory)) 1000 }}
            {{- else if hasSuffix "T" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "T" .resources.limits.memory)) 1000 1000 }}
            {{- else if hasSuffix "P" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "P" .resources.limits.memory)) 1000 1000 1000 }}
            {{- else if hasSuffix "E" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "E" .resources.limits.memory)) 1000 1000 1000 1000 }}
            {{- else if hasSuffix "E" (toString .resources.limits.memory) }}
              {{- $megabytes = mulf (float64 (trimSuffix "E" .resources.limits.memory)) 1000 1000 1000 1000 }}
            {{- else if or (regexMatch "^[0-9]+$" (toString .resources.limits.memory)) (regexMatch "^[0-1]\\.?[0-9]*e[\\+|-][0-9]+$" (toString .resources.limits.memory)) }}
              {{- $megabytes = divf (float64 .resources.limits.memory) 1024 1024 }}
            {{- end }}         
            {{- if and (ge (float64 $megabytes) 2048.0) (le (float64 $megabytes) 4096.0)}}
              {{- $memoryLimitTop = 0.6}}
              {{- $memoryLimitBottom = 0.5}}
            {{- else if (gt (float64 $megabytes) 4096.0)}}
              {{- $memoryLimitTop = 0.8}}
              {{- $memoryLimitBottom = 0.7}}
            {{- end }}
            {{- if ge (float64 $megabytes) 2048.0 }}
            - name: MEMORYLIMITTOP
              value: {{ $memoryLimitTop | quote }}
            - name: MEMORYLIMITBOTTOM
              value: {{ $memoryLimitBottom | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end -}}

          {{- if .resources }}
          resources:
{{ toYaml .resources | indent 12 }}
          {{- end }}
        {{- if $.Values.fmeflow.engines.podDeletionCost.enabled }}
        - name: pod-deletion-cost-watcher
          image: "{{ $.Values.fmeflow.engines.podDeletionCost.image.registry }}/{{ $.Values.fmeflow.engines.podDeletionCost.image.repository }}:{{ $.Values.fmeflow.engines.podDeletionCost.image.tag }}"
          imagePullPolicy: {{ $.Values.fmeflow.engines.podDeletionCost.image.pullPolicy }}
          securityContext:
            runAsUser: {{ $.Values.fmeflow.engines.podDeletionCost.runAsUser }}
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: {{ dir $.Values.fmeflow.engines.podDeletionCost.markerFilePath }}
              name: pod-deletion-cost-state
              readOnly: true
            # Writable scratch space for curl's temp files. The rest of the
            # sidecar's root filesystem stays read-only via the
            # securityContext above.
            - mountPath: /tmp
              name: pod-deletion-cost-sidecar-tmp
          command:
            - /bin/sh
            - -c
            - |
              set -u
              TOKEN_FILE=/var/run/secrets/kubernetes.io/serviceaccount/token
              CA_FILE=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              URL="https://kubernetes.default.svc/api/v1/namespaces/$POD_NAMESPACE/pods/$POD_NAME"
              MARKER_FILE="{{ $.Values.fmeflow.engines.podDeletionCost.markerFilePath }}"
              BOOTSTRAP_TIMEOUT={{ $.Values.fmeflow.engines.podDeletionCost.bootstrapTimeoutSeconds }}
              echo "[pod-deletion-cost] starting: pod=$POD_NAME ns=$POD_NAMESPACE marker=$MARKER_FILE"
              # Wait for the engine's watcher to create the marker file. If it
              # never appears, the engine image is older than FME Flow 2026.3
              # and does not ship pod-deletion-cost-watcher.sh.
              DEADLINE=$(( $(date +%s) + BOOTSTRAP_TIMEOUT ))
              while [ ! -f "$MARKER_FILE" ]; do
                if [ $(date +%s) -ge $DEADLINE ]; then
                  echo "[pod-deletion-cost] marker file $MARKER_FILE did not appear within ${BOOTSTRAP_TIMEOUT}s." >&2
                  echo "[pod-deletion-cost] the engine image does not ship pod-deletion-cost-watcher.sh; upgrade to FME Flow 2026.3 or newer." >&2
                  exit 1
                fi
                sleep 1
              done
              echo "[pod-deletion-cost] marker file found; entering watch loop"
              LAST=""
              while true; do
                STATE=$(cat "$MARKER_FILE" 2>/dev/null || echo unknown)
                case "$STATE" in
                  busy) COST={{ $.Values.fmeflow.engines.podDeletionCost.busyValue }} ;;
                  idle) COST={{ $.Values.fmeflow.engines.podDeletionCost.idleValue }} ;;
                  *)
                    echo "[pod-deletion-cost] unexpected marker content '$STATE'; skipping" >&2
                    sleep {{ $.Values.fmeflow.engines.podDeletionCost.pollIntervalSeconds }}
                    continue
                    ;;
                esac
                if [ "$STATE" != "$LAST" ]; then
                  echo "[pod-deletion-cost] transition ${LAST:-<init>} -> $STATE, patching pod-deletion-cost=$COST"
                  BODY_FILE=$(mktemp)
                  ERR_FILE=$(mktemp)
                  HTTP=$(curl -sS -o "$BODY_FILE" -w "%{http_code}" \
                    --cacert "$CA_FILE" \
                    -H "Authorization: Bearer $(cat $TOKEN_FILE)" \
                    -H "Content-Type: application/strategic-merge-patch+json" \
                    -X PATCH \
                    --data "{\"metadata\":{\"annotations\":{\"controller.kubernetes.io/pod-deletion-cost\":\"$COST\"}}}" \
                    "$URL" 2>"$ERR_FILE")
                  ERR=$(cat "$ERR_FILE")
                  echo "[pod-deletion-cost] PATCH HTTP $HTTP"
                  if [ -n "$ERR" ]; then
                    echo "[pod-deletion-cost] curl stderr: $ERR"
                  fi
                  if [ "$HTTP" = "200" ]; then
                    echo "[pod-deletion-cost] PATCH ok"
                    LAST=$STATE
                  else
                    echo "[pod-deletion-cost] PATCH failed body: $(cat $BODY_FILE)"
                  fi
                  rm -f "$BODY_FILE" "$ERR_FILE"
                fi
                sleep {{ $.Values.fmeflow.engines.podDeletionCost.pollIntervalSeconds }}
              done
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
{{ toYaml $.Values.fmeflow.engines.podDeletionCost.resources | indent 12 }}
        {{- end }}
      {{- if not (empty $.Values.fmeflow.engines.awsServiceAccount) }}
      serviceAccountName: "fme-engine-aws"
      {{- else if $.Values.fmeflow.engines.podDeletionCost.enabled }}
      serviceAccountName: "fme-engine-pod-deletion-cost"
      {{- end }}
      automountServiceAccountToken: {{ if $.Values.fmeflow.engines.podDeletionCost.enabled }}true{{ else }}{{ $.Values.deployment.automountServiceAccountToken }}{{ end }}
      terminationGracePeriodSeconds: {{ $.Values.fmeflow.engines.terminationGracePeriodSeconds }}
      restartPolicy: Always
      volumes:
        - name: fmeflowdata
          persistentVolumeClaim:
            claimName: {{ template "fmeflow.storage.data.claimName" $ }}
        {{- if $.Values.additionalStorage }}
        {{- range $.Values.additionalStorage }}
        - name: {{ .name }}
          persistentVolumeClaim:
            claimName: {{ if .existingClaim }}{{ .existingClaim }}{{ else }}{{ .name }}{{ end }}
        {{- end }}
        {{- end }}
        {{- if .trustedCACerts }}
        {{- if .trustedCACerts.secretName }}
        - name: trusted-ca-certs
          secret:
            secretName: {{ .trustedCACerts.secretName }}
        {{- end }}
        {{- end }}
        {{- if $.Values.fmeflow.engines.podDeletionCost.enabled }}
        - name: pod-deletion-cost-state
          emptyDir: {}
        - name: pod-deletion-cost-sidecar-tmp
          emptyDir: {}
        {{- end }}
      affinity:
        {{- include "fmeflow.deployment.dataVolumeAffinity" $ | indent 8 }}
      {{- if .affinity }}
{{ toYaml .affinity | indent 8 }}
      {{- end }}
      {{- if .nodeSelector }}
      nodeSelector:
{{ toYaml .nodeSelector | indent 8 }}
      {{- end }}
      {{- if .tolerations }}
      tolerations:
{{ toYaml .tolerations | indent 8 }}
      {{- end }}
---
{{- end }}
