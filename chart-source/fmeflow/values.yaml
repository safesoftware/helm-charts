fmeflow:
  image:
    tag:
    registry: docker.io
    namespace: safesoftware
    # Supported values: Always or IfNotPresent
    pullPolicy: IfNotPresent
    # Name of existing secret to use for pulling images from private registries
    pullSecrets: []
    core:
      name: fmeflow-core
      # Uncomment to override the global registry/namespace for this image
      # registry:
      # namespace:
    web:
      name: fmeflow-web
      # registry:
      # namespace:
    queue:
      name: fmeflow-queue
      # registry:
      # namespace:
    utilityengine:
      name: fmeflow-engine
      # registry:
      # namespace:
    deploymenttester:
      name: fmeflow-deployment-tester
      # registry:
      # namespace:
  database:
    host:
    port: '5432'
    name: fmeflow
    user: fmeflow
    password: 4fmmsgrz09
    passwordSecret:
    passwordSecretKey: fmeflow-db-password
    # require ssl on the connection
    ssl: false
    # set to true if using Azure Postgresql to make sure connection strings are formatted correctly
    azure: false

    # This user and password must be a database user that can create databases and users in the postgresql database
    adminUser: postgres
    adminPassword: a6av3abwzi
    adminPasswordSecret:
    adminPasswordSecretKey:  postgres-password
    adminDatabase: postgres
  webserver:
    maxThreads: 200
    experimentalJavaFlags: false
    hikariDBMaxConnections: 30
  fmeutility:
    enabled: true
  forcePasswordChange: true
  debugLevel: "NONE"
  enableTransactionQueueTimeout: false
  waitForDatabase: true
  waitForQueue: true
  scheduler:
    idleWaitTime: 5000
  maintenance:
    idleWait: 90
  healthcheck:
    enabled: true
    liveness:
      initialDelaySeconds: 60
      failureThreshold: 6
      timeoutSeconds: 5
      periodSeconds: 10
    readiness:
      initialDelaySeconds: 60
      failureThreshold: 3
      timeoutSeconds: 5
      periodSeconds: 5
    startup:
      initialDelaySeconds: 10
      failureThreshold: 20
      timeoutSeconds: 5
      periodSeconds: 30
  # Mount a Kubernetes Secret containing CA certificates (.crt or .pem files) into the
  # Core and Web containers. The Core container's startup script imports every file it
  # finds under /etc/fmeflow/trusted-ca-certs/ into the Java keystore before launching
  # the Java process. Typical use case: trusting the domain controller's CA for LDAPS
  # authentication. Leave secretName unset to disable.
  trustedCACerts:
    secretName:
  engines:
    debugLevel: "NONE"
    hideHostContent: true
    enginesNodeManaged: false
    receiveTimeout: 0
    terminationGracePeriodSeconds: 300
    # When enabled, a sidecar runs in each engine pod and patches the
    # controller.kubernetes.io/pod-deletion-cost annotation based on whether
    # the engine is currently running a job. The Kubernetes scheduler then
    # prefers to evict idle engines over busy ones when scaling down.
    # Requires FME Flow 2026.3 or newer.
    podDeletionCost:
      enabled: false
      busyValue: 10000
      idleValue: 0
      pollIntervalSeconds: 5
      markerFilePath: /var/run/fmeflow/job-state
      bootstrapTimeoutSeconds: 60
      runAsUser: 65532
      image:
        registry: docker.io
        repository: curlimages/curl
        tag: 8.20.0
        pullPolicy: IfNotPresent
      resources:
        requests:
          memory: 32Mi
          cpu: 10m
    groups:
      - name: "standard-group"
        engines: 2
        type: "STANDARD"
        labels: {}
        affinity: {}
        nodeSelector: {}
        tolerations: []
        engineProperties:
        # Name of a Kubernetes Secret containing CA certificates (.crt or .pem files)
        # to import into the Java keystore of engines in this group at startup. Use
        # when workspaces run on this engine group need to trust a private CA for
        # outbound TLS connections. Leave secretName unset to disable.
        trustedCACerts:
          secretName:
        resources:
          requests:
            memory: 512Mi
            cpu: 200m
      - name: "dynamic-group"
        engines: 0
        type: "DYNAMIC"
        labels: {}
        affinity: {}
        nodeSelector: {}
        tolerations: []
        engineProperties:
        trustedCACerts:
          secretName:
        resources:
          requests:
            memory: 512Mi
            cpu: 200m



deployment:
  hostname: localhost
  port: 443
  serviceUrlMode: ingress
  tlsSecretName:
  certManager:
    issuerName:
    issuerType: cluster
  numCores: 1
  startAsRoot: false
  useHostnameIngress: true
  deployPostgresql: true
  disableTLS: false
  automountServiceAccountToken: false
  ingress:
    enabled: true
    # enable nginx mergeable ingress resources (master/minion) when useHostnameIngress is true
    useNginxMergeable: true
    # general annotations are applied to all ingresses
    general:
      ingressClassName: "nginx"
      pathType: Prefix
      annotations:
        nginx.org/client-max-body-size: "0"
    # annotations on the default web traffic ingress
    web:
      annotations:
        nginx.org/proxy-read-timeout: "300s"
    # annotations on the migration endpoint
    migration:
      annotations:
        nginx.org/proxy-read-timeout: "1800s"
    # annotations on the transact api endpoint
    transact:
      annotations:
        # 14 days read timeout for transact jobs
        nginx.org/proxy-read-timeout: "1209600s"
    websocket:
      annotations:
        nginx.org/proxy-read-timeout: "2592000s"
        nginx.org/websocket-services: "fmeflowwebsocket"


